<style>
  * { box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: #000000; min-height: 100vh; color: #e2e8f0; overflow-x: hidden; cursor: none; }
  body.touch-device { cursor: auto; }

  /* Custom Cursor */
  #cursor-dot { width: 6px; height: 6px; background: #818cf8; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: background 0.2s; }
  #cursor-ring { width: 32px; height: 32px; border: 1.5px solid rgba(129,140,248,0.6); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, border-color 0.2s; }
  #cursor-ring.hovering { width: 48px; height: 48px; border-color: rgba(129,140,248,0.9); }

  /* Glass card */
  .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; transition: all 0.25s ease; }
  .glass:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.16); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.8); }
  .glass-modal { background: rgba(10,10,10,0.97); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  /* Drag states */
  .card-dragging { opacity: 0.4; transform: scale(0.96); }
  .card-drag-over { border-color: rgba(129,140,248,0.7) !important; box-shadow: 0 0 0 2px rgba(129,140,248,0.4); }

  /* Rearrange pulse */
  .rearrange-pulse { animation: pulsering 1.5s ease-in-out infinite; }
  @keyframes pulsering {
    0%, 100% { box-shadow: 0 0 0 0 rgba(129,140,248,0.5); }
    50% { box-shadow: 0 0 0 8px rgba(129,140,248,0); }
  }

  /* Bottom sheet */
  #bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 500; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); border-radius: 24px 24px 0 0; background: rgba(8,8,8,0.99); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.1); padding: 0 20px 40px; max-height: 90vh; overflow-y: auto; }
  #bottom-sheet.open { transform: translateY(0); }
  .sheet-handle { width: 40px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; margin: 12px auto 20px; }

  /* Modal overlay */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 400; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  #modal-overlay.open { opacity: 1; pointer-events: all; }
  #desktop-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); z-index: 500; width: 420px; max-width: 90vw; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  #desktop-modal.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }

  /* Input styles */
  .aether-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: #e2e8f0; width: 100%; outline: none; font-family: 'Space Grotesk', sans-serif; font-size: 14px; transition: border-color 0.2s, background 0.2s; }
  .aether-input:focus { border-color: rgba(129,140,248,0.6); background: rgba(255,255,255,0.07); }
  .aether-input::placeholder { color: rgba(255,255,255,0.3); }
  .aether-btn { font-family: 'Space Grotesk', sans-serif; border-radius: 10px; padding: 10px 20px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; outline: none; }
  .btn-primary { background: linear-gradient(135deg, #818cf8, #6366f1); color: white; }
  .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .btn-ghost { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.08); }
  .btn-ghost:hover { background: rgba(255,255,255,0.09); }

  /* Clock */
  #clock { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

  /* Add card */
  .add-card { border: 2px dashed rgba(129,140,248,0.3); cursor: pointer; background: rgba(129,140,248,0.04); }
  .add-card:hover { border-color: rgba(129,140,248,0.6); background: rgba(129,140,248,0.08); transform: translateY(-3px); }

  /* Image upload preview */
  #img-preview { width: 64px; height: 64px; object-fit: cover; border-radius: 10px; display: none; }

  /* Site card favicon */
  .site-favicon { width: 36px; height: 36px; border-radius: 10px; object-fit: contain; background: rgba(255,255,255,0.1); padding: 4px; }

  /* Edit modal */
  #edit-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); z-index: 500; width: 420px; max-width: 90vw; opacity: 0; pointer-events: none; transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1); }
  #edit-modal.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }
  /* Edit bottom sheet */
  #edit-bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; z-index: 500; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1); border-radius: 24px 24px 0 0; background: rgba(8,8,8,0.99); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.1); padding: 0 20px 40px; max-height: 90vh; overflow-y: auto; }
  #edit-bottom-sheet.open { transform: translateY(0); }

  /* Delete btn on card */
  .card-delete-btn { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s, background 0.2s; cursor: pointer; z-index: 10; }
  .card-delete-btn:hover { background: rgba(239,68,68,0.4); }
  .glass:hover .card-delete-btn { opacity: 1; }
  body.touch-device .card-delete-btn { opacity: 0.7; }

  /* Local file badge on card */
  .local-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 6px; border-radius: 100px; background: rgba(52,211,153,0.15); color: rgba(52,211,153,0.9); border: 1px solid rgba(52,211,153,0.2); margin-top: 4px; }

  /* Toast */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); z-index: 700; padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s; background: rgba(129,140,248,0.9); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Rearrange toggle */
  .rearrange-active { border: 2px solid rgba(129,140,248,0.5) !important; }

  /* Stagger animation */
  .card-enter { animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes cardIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

  /* Color accent bar on card */
  .card-accent { height: 2px; border-radius: 2px; background: linear-gradient(90deg, #818cf8, #60a5fa); margin-bottom: 12px; opacity: 0; transition: opacity 0.25s; }
  .glass:hover .card-accent { opacity: 1; }

  /* Local file: green accent bar */
  .card-accent-local { height: 2px; border-radius: 2px; background: linear-gradient(90deg, #34d399, #10b981); margin-bottom: 12px; opacity: 0; transition: opacity 0.25s; }
  .glass:hover .card-accent-local { opacity: 1; }

  /* Category badge */
  .cat-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 100px; background: rgba(129,140,248,0.2); color: rgba(129,140,248,0.9); }

  /* Stars/particles bg */
  canvas#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.7; }

  .content-wrapper { position: relative; z-index: 1; }

  /* URL type toggle */
  .url-type-btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.4); }
  .url-type-btn.active { background: rgba(129,140,248,0.2); color: rgba(129,140,248,1); border-color: rgba(129,140,248,0.4); }
</style>

<script>
// ─────────────────────────────────────────────
// DEVICE INTELLIGENCE
// ─────────────────────────────────────────────
const isTouchDevice = window.matchMedia("(pointer: coarse)").matches;

if (isTouchDevice) {
  document.body.classList.add('touch-device');
  document.getElementById('cursor-dot').remove();
  document.getElementById('cursor-ring').remove();
} else {
  initCursor();
}

function initCursor() {
  const dot = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  let mx = 0, my = 0, rx = 0, ry = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    dot.style.left = mx + 'px'; dot.style.top = my + 'px';
  });

  const hoverEls = 'button, a, [data-site], .add-card, input, label, .glass';
  document.addEventListener('mouseover', e => {
    if (e.target.closest(hoverEls)) ring.classList.add('hovering');
  });
  document.addEventListener('mouseout', e => {
    if (e.target.closest(hoverEls)) ring.classList.remove('hovering');
  });

  function animRing() {
    rx += (mx - rx) * 0.15;
    ry += (my - ry) * 0.15;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    requestAnimationFrame(animRing);
  }
  animRing();
}

// ─────────────────────────────────────────────
// STARS BACKGROUND
// ─────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let stars = [];

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    stars = Array.from({length: 120}, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: Math.random() * 1.2 + 0.3,
      a: Math.random(),
      speed: Math.random() * 0.005 + 0.002
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    stars.forEach(s => {
      s.a += s.speed;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${0.3 + 0.3 * Math.sin(s.a)})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

function updateClock() {

  const h = now.getHours(), m = now.getMinutes();

  const displayH = h % 12 || 12;

// Detect if a URL is a local file path (not a web URL)
function isLocalPath(url) {
  if (!url) return false;
  // Local if: no protocol, or file:// protocol, or starts with ./ or ../
  return !url.startsWith('http://') &&
         !url.startsWith('https://') &&
         !url.startsWith('//');
}

// Build a navigable URL from a stored URL value
function buildUrl(url) {
  if (!url) return '#';
  if (isLocalPath(url)) return url; // already a relative path
  return url; // already absolute web URL
}

// When saving a web URL, auto-prepend https:// if missing
function normalizeWebUrl(url) {
  if (!url) return url;
  if (isLocalPath(url)) return url; // don't touch local paths
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    return 'https://' + url;
  }
  return url;
}

// Get the domain for favicon lookup — returns null for local paths
function getDomain(url) {
  if (isLocalPath(url)) return null;
  try { return new URL(url).hostname; }
  catch { return null; }
}

// ─────────────────────────────────────────────
// URL TYPE TOGGLE IN FORMS
// ─────────────────────────────────────────────
function setUrlType(prefix, type) {
  const webBtn = document.getElementById(`${prefix}-type-web`);
  const localBtn = document.getElementById(`${prefix}-type-local`);
  const urlInput = document.getElementById(`${prefix}-url`);
  const hint = document.getElementById(`${prefix}-url-hint`);

  if (type === 'web') {
    webBtn.classList.add('active');
    localBtn.classList.remove('active');
    urlInput.placeholder = 'https://github.com';
    urlInput.setAttribute('data-url-type', 'web');
    if (hint) hint.classList.add('hidden');
  } else {
    localBtn.classList.add('active');
    webBtn.classList.remove('active');
    urlInput.placeholder = 'apps/myapp.html';
    urlInput.setAttribute('data-url-type', 'local');
    if (hint) hint.classList.remove('hidden');
  }
  urlInput.value = '';
  urlInput.focus();
}

// Auto-detect and set correct toggle when editing an existing site
function autoDetectUrlType(prefix, url) {
  if (isLocalPath(url)) {
    setUrlType(prefix, 'local');
  } else {
    setUrlType(prefix, 'web');
  }
  document.getElementById(`${prefix}-url`).value = url;
}

function getSites() {
  try { return JSON.parse(localStorage.getItem('aether_sites') || '[]'); }
  catch { return []; }
}
function saveSites(sites) {
  try { localStorage.setItem('aether_sites', JSON.stringify(sites)); }
  catch { showToast('Storage full – try removing large icons'); }
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// Image optimization via canvas
function optimizeImage(dataUrl, cb) {
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    const MAX = 64;
    const scale = Math.min(MAX / img.width, MAX / img.height, 1);
    canvas.width = img.width * scale;
    canvas.height = img.height * scale;
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    cb(canvas.toDataURL('image/webp', 0.7));
  };
  img.src = dataUrl;
}

// ─────────────────────────────────────────────
// ICON SYSTEM — multi-source with canvas fallback
// ─────────────────────────────────────────────

// Palette for letter-icon backgrounds
const ICON_COLORS = [
  '#6366f1','#8b5cf6','#ec4899','#f43f5e',
  '#f97316','#eab308','#22c55e','#14b8a6',
  '#3b82f6','#06b6d4'
];

function getIconColor(title) {
  let hash = 0;
  for (let i = 0; i < title.length; i++) hash = title.charCodeAt(i) + ((hash << 5) - hash);
  return ICON_COLORS[Math.abs(hash) % ICON_COLORS.length];
}

// Draw a letter-icon onto a canvas and return a data URL
function makeLetterIcon(title, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  // Background
  ctx.fillStyle = color + '33'; // 20% opacity fill
  ctx.beginPath();
  ctx.roundRect(0, 0, 64, 64, 14);
  ctx.fill();
  // Border
  ctx.strokeStyle = color + '88';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Letter
  ctx.fillStyle = color;
  ctx.font = 'bold 28px Space Grotesk, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText((title || '?')[0].toUpperCase(), 32, 33);
  return canvas.toDataURL();
}

// Try favicon sources in order, falling back to letter icon
function setFavicon(imgEl, site) {
  if (site.image) {
    imgEl.src = site.image;
    return;
  }

  const local = isLocalPath(site.url);
  const color = getIconColor(site.title);

  if (local) {
    // Local files always get a letter icon (no network lookup possible)
    imgEl.src = makeLetterIcon(site.title, '#34d399');
    return;
  }

  const domain = getDomain(site.url);
  if (!domain) {
    imgEl.src = makeLetterIcon(site.title, color);
    return;
  }

  // Try sources in sequence
  const sources = [
    `https://www.google.com/s2/favicons?sz=64&domain=${domain}`,
    `https://icons.duckduckgo.com/ip3/${domain}.ico`,
    `https://favicon.im/${domain}?larger=true`,
    `https://${domain}/favicon.ico`,
  ];

  let idx = 0;
  function tryNext() {
    if (idx >= sources.length) {
      // All failed — use letter icon
      imgEl.src = makeLetterIcon(site.title, color);
      imgEl.onerror = null;
      return;
    }
    imgEl.onerror = () => { idx++; tryNext(); };
    imgEl.src = sources[idx++];
  }
  tryNext();
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
let rearrangeMode = false;
let dragSrcId = null;
let longPressTimer = null;

function renderSites() {
  const grid = document.getElementById('sites-grid');
  const emptyState = document.getElementById('empty-state');
  const query = document.getElementById('search-input').value.toLowerCase();
  let sites = getSites();

  if (query) sites = sites.filter(s => {
    const domain = getDomain(s.url) || '';
    return s.title.toLowerCase().includes(query) || domain.includes(query) || s.url.toLowerCase().includes(query);
  });

  grid.innerHTML = '';

  if (sites.length === 0 && !query) {
    emptyState.classList.remove('hidden');
    return;
  }
  emptyState.classList.add('hidden');

  sites.forEach((site, idx) => {
    const local = isLocalPath(site.url);
    const card = document.createElement('div');
    card.className = `glass p-4 flex flex-col items-center text-center cursor-pointer select-none card-enter${rearrangeMode ? ' rearrange-active' + (isTouchDevice ? ' rearrange-pulse' : '') : ''}`;
    card.style.animationDelay = `${idx * 0.04}s`;
    card.dataset.id = site.id;
    card.setAttribute('draggable', rearrangeMode && !isTouchDevice ? 'true' : 'false');
    card.style.minHeight = '44px';
    card.style.position = 'relative';

    // Accent bar colour: green for local, indigo for web
    const accentClass = local ? 'card-accent-local' : 'card-accent';

    card.innerHTML = `
      <div class="${accentClass} w-full"></div>
      <button class="card-delete-btn" onclick="event.stopPropagation(); deleteSite('${site.id}')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(239,100,100,0.9)" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      ${rearrangeMode ? '<div class="text-slate-500 mb-2 text-xs">⠿</div>' : ''}
      <img class="site-favicon mb-3" alt="">
      <span class="text-sm font-600 text-white leading-tight truncate w-full" style="font-weight:600">${esc(site.title)}</span>
      ${site.category ? `<span class="cat-badge mt-2">${esc(site.category)}</span>` : ''}
      ${local ? `<span class="local-badge">local</span>` : ''}
    `;

    // Set favicon via robust multi-source loader
    setFavicon(card.querySelector('img'), site);

    // Click to open
    card.addEventListener('click', () => {
      if (rearrangeMode) return;
      const url = site.url;
      if (isLocalPath(url)) {
        // Local files: navigate in the same tab (works for file:// and served paths)
        window.location.href = url;
      } else {
        window.open(url, '_blank');
      }
    });

    // Desktop right-click → edit modal
    if (!isTouchDevice) {
      card.addEventListener('contextmenu', e => {
        e.preventDefault();
        openEditModal(site.id);
      });
      if (rearrangeMode) {
        card.addEventListener('dragstart', e => {
          dragSrcId = site.id;
          card.classList.add('card-dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => card.classList.remove('card-dragging'));
        card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('card-drag-over'); });
        card.addEventListener('dragleave', () => card.classList.remove('card-drag-over'));
        card.addEventListener('drop', e => {
          e.preventDefault();
          card.classList.remove('card-drag-over');
          if (dragSrcId && dragSrcId !== site.id) reorderSites(dragSrcId, site.id);
        });
      }
    } else {
      // Double-tap to edit on mobile
      let lastTap = 0;
      card.addEventListener('touchend', e => {
        const now = Date.now();
        if (now - lastTap < 300 && now - lastTap > 50) {
          e.preventDefault();
          clearTimeout(longPressTimer);
          openEditModal(site.id);
        }
        lastTap = now;
      }, { passive: false });

      if (!rearrangeMode) {
        card.addEventListener('touchstart', e => {
          longPressTimer = setTimeout(() => {
            rearrangeMode = true;
            showToast('Rearrange mode — drag to reorder');
            document.getElementById('rearrange-btn').classList.add('rearrange-active');
            renderSites();
          }, 600);
        }, { passive: true });
        card.addEventListener('touchend', () => clearTimeout(longPressTimer), { passive: true });
        card.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });
      } else {
        let touchSrcId = site.id;
        card.addEventListener('touchstart', e => { dragSrcId = touchSrcId; }, { passive: true });
        card.addEventListener('touchend', e => {
          if (!dragSrcId) return;
          const touch = e.changedTouches[0];
          const el = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('[data-id]');
          if (el && el.dataset.id !== dragSrcId) reorderSites(dragSrcId, el.dataset.id);
          dragSrcId = null;
        }, { passive: true });
      }
    }

    grid.appendChild(card);
  });

  // Add site card
  if (!query) {
    const addCard = document.createElement('div');
    addCard.className = 'glass add-card p-4 flex flex-col items-center justify-center text-center min-h-[100px]';
    addCard.innerHTML = `
      <div class="w-10 h-10 rounded-full flex items-center justify-center mb-2" style="background:rgba(129,140,248,0.15)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(129,140,248,0.8)" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <span class="text-xs text-slate-500 font-600">Add Site</span>
    `;
    addCard.onclick = openAddModal;
    grid.appendChild(addCard);
  }
}

function reorderSites(fromId, toId) {
  const sites = getSites();
  const fromIdx = sites.findIndex(s => s.id === fromId);
  const toIdx = sites.findIndex(s => s.id === toId);
  if (fromIdx === -1 || toIdx === -1) return;
  const [moved] = sites.splice(fromIdx, 1);
  sites.splice(toIdx, 0, moved);
  saveSites(sites);
  renderSites();
}

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
